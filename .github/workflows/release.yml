name: Release
# Bumps the version on push to master via semantic-release.
# The PyPI publish runs in publish.yml on `release: published`.
on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # git push + tag + create-release
    steps:
      - uses: actions/checkout@v6
      - name: Get semantic release info
        id: semantic_release_info
        uses: jossef/action-semantic-release-info@v3.0.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Bump version + tag + release
        if: ${{ steps.semantic_release_info.outputs.version != '' }}
        env:
          VERSION: ${{ steps.semantic_release_info.outputs.version }}
          TAG: ${{ steps.semantic_release_info.outputs.git_tag }}
          NOTES: ${{ steps.semantic_release_info.outputs.notes }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          sed -i "s/version=\".*\",/version=\"${VERSION}\",/g" setup.py
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add setup.py
          git commit -m "chore: bumping version to ${VERSION}"
          git tag "${TAG}"
          git push origin HEAD:master --tags
          gh release create "${TAG}" --title "${TAG}" --notes "${NOTES}"
