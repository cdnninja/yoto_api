name: Release
# Bumps the version, tags, creates a GitHub Release, and publishes to
# PyPI in a single job. PyPI auth uses Trusted Publisher (OIDC), no
# static token. Distribution files carry Sigstore attestations.
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write # git push + tag + create-release
      id-token: write # PyPI Trusted Publisher (OIDC)
      attestations: write # Sigstore attestations on the published files
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # semantic-release needs full history to find prior tags
      - name: Get semantic release info
        id: semantic_release_info
        uses: cycjimmy/semantic-release-action@v4
        with:
          dry_run: true # only compute the next version; the steps below publish
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Bump version + tag + release
        if: ${{ steps.semantic_release_info.outputs.new_release_published == 'true' }}
        env:
          VERSION: ${{ steps.semantic_release_info.outputs.new_release_version }}
          TAG: ${{ steps.semantic_release_info.outputs.new_release_git_tag }}
          NOTES: ${{ steps.semantic_release_info.outputs.new_release_notes }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          sed -i "s/version=\".*\",/version=\"${VERSION}\",/g" setup.py
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add setup.py
          git commit -m "chore: bumping version to ${VERSION}"
          git tag "${TAG}"
          git push origin HEAD:master --tags
          gh release create "${TAG}" --title "${TAG}" --notes "${NOTES}"
      - if: ${{ steps.semantic_release_info.outputs.new_release_published == 'true' }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Build package
        if: ${{ steps.semantic_release_info.outputs.new_release_published == 'true' }}
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI
        if: ${{ steps.semantic_release_info.outputs.new_release_published == 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
